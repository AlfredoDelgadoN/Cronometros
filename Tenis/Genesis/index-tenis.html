<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tennis Stats Pro - Matrix 4x4 Fixed</title>
    <style>
        :root {
            --col-E: #1b5e20; --col-V: #2e7d32; --col-B: #66bb6a;
            --col-draw: #78909c; --col-M: #ef6c00; --col-X: #c62828;
            --court-blue: #2c3e50; --tennis-yellow: #dff115;
            --col-choke: #ff1744; --col-streak: #00e5ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f0f3f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header-fixed { 
            background: var(--court-blue); 
            color: white; 
            flex-shrink: 0; 
            border-bottom: 2px solid #444; 
            position: relative; /* Para posicionar el botón */
        }
        .score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
        .p-box { text-align: center; padding: 2px; border-bottom: 3px solid transparent; }
        .serving-now { background: rgba(255,255,255,0.1); border-bottom-color: var(--tennis-yellow); }
        .pts { font-size: 2rem; font-weight: 900; color: var(--tennis-yellow); line-height: 1; margin: 1px 0; }
        .p-name { background: transparent; color: white; border: none; font-weight: bold; font-size: 0.75rem; width: 80%; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .line-info { font-size: 0.52rem; color: #fff; display: flex; justify-content: center; gap: 4px; font-family: monospace; margin-bottom: 2px; }
        .stat-group { display: flex; gap: 3px; }
        
        /* MATRIZ 5x4 CON DIFERENCIA W-L */
        .matrix-table { width: 95%; margin: 2px auto; border-collapse: collapse; background: rgba(0,0,0,0.3); table-layout: fixed; }
        .matrix-table td { 
            height: 14px; 
            border: 1px solid rgba(255,255,255,0.2); 
            text-align: center; 
            font-size: 0.55rem; 
            padding: 1px;
        }
        .m-win { color: #66bb6a; font-weight: bold; }
        .m-loss { color: #ff5252; font-weight: bold; }
        .diff-cell { 
            border-left: 2px solid rgba(255,255,255,0.5) !important;
            font-weight: bold;
            font-size: 0.6rem;
        }
        .diff-positive { color: #66bb6a; }
        .diff-negative { color: #ff5252; }

        .trend-table { width: 100%; background: #fff; border-collapse: collapse; font-size: 0.52rem; color: #333; }
        .trend-table td { border: 1px solid #eee; padding: 1px; text-align: center; font-weight: bold; height: 16px; }
        .row-label { background: #f5f5f5; width: 14%; color: #888; }

        .main-scroll { flex: 1; overflow-y: auto; padding: 2px; display: flex; flex-direction: column; gap: 2px; }
        .stream-container { background: white; border-radius: 4px; padding: 2px; border: 1px solid #ddd; }
        .stream { height: 48px; display: flex; align-items: flex-end; gap: 2px; overflow-x: auto; padding: 4px; }
        .dot { width: 22px; height: 16px; border-radius: 2px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.48rem; font-weight: bold; flex-shrink: 0; }
        
        .counters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .player-card { background: white; padding: 4px; border-radius: 4px; border: 1px solid #ccc; }
        .count-row { display: flex; gap: 1px; justify-content: space-between; }
        .c-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .c-val { font-size: 0.75rem; font-weight: 900; }
        .c-tag { font-size: 0.42rem; color: #fff; width: 95%; text-align: center; border-radius: 1px; font-weight: bold; padding: 1px 0; }

        .footer-fixed { background: var(--court-blue); padding: 4px; flex-shrink: 0; }
        .analysis-selector { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        .sel-btn { background: #455a64; color: white; border: none; padding: 12px 0; border-radius: 4px; font-size: 0.5rem; font-weight: bold; }
        .sel-btn.active { background: var(--tennis-yellow); color: #2c3e50; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
        .btn-act { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; font-size: 0.7rem; }
        
        .h-5 { margin-bottom: 22px; } .h-4 { margin-bottom: 16px; } .h-3 { margin-bottom: 10px; } .h-2 { margin-bottom: 5px; } .h-1 { margin-bottom: 0px; }
        
        /* Botón de pantalla completa discreto */
        .fullscreen-btn { 
            position: absolute; 
            top: 2px; 
            right: 2px; 
            z-index: 1000; 
            background: rgba(255,255,255,0.15); 
            color: rgba(255,255,255,0.7); 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 3px; 
            padding: 2px 6px; 
            font-size: 0.5rem; 
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
        }
        .fullscreen-btn:hover { 
            background: rgba(255,255,255,0.25); 
            color: white; 
            border-color: rgba(255,255,255,0.5);
        }
        
        /* Estilos para pantalla completa */
        body:fullscreen { padding: 0; background: #f0f3f5; }
        body:fullscreen .header-fixed { border-radius: 0; }
        body:fullscreen .footer-fixed { border-radius: 0; }
        body:fullscreen .fullscreen-btn { 
            top: 10px; 
            right: 10px; 
            background: rgba(0,0,0,0.3); 
            color: rgba(255,255,255,0.9); 
            border: 1px solid rgba(255,255,255,0.4); 
            padding: 4px 8px;
        }
    </style>
</head>
<body>

<div class="header-fixed">
    <!-- Botón de pantalla completa en la esquina superior derecha -->
    <button class="fullscreen-btn" id="fullscreen-btn" onclick="toggleFullScreen()" title="Pantalla completa">⛶</button>
    
    <div class="score-row">
        <div id="zone1" class="p-box serving-now" onclick="addPoint(1)">
            <input type="text" id="name1" class="p-name" value="JUGADOR 1">
            <div id="pts1" class="pts">0</div>
            <div class="line-info">
                <div class="stat-group">S:<b id="s1">0</b> G:<b id="g1">0</b></div>
                <div class="stat-group" style="color:var(--tennis-yellow)">W:<span id="sw1">0</span> L:<span id="sl1">0</span></div>
                <div class="stat-group"><span style="color:var(--col-choke)">CH:<span id="ch1">0</span></span> <span style="color:var(--col-streak)">M:<span id="m1">0</span></span></div>
            </div>
            <table class="matrix-table" id="matrix1">
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
            </table>
        </div>
        <div id="zone2" class="p-box" onclick="addPoint(2)">
            <input type="text" id="name2" class="p-name" value="JUGADOR 2">
            <div id="pts2" class="pts">0</div>
            <div class="line-info">
                <div class="stat-group">S:<b id="s2">0</b> G:<b id="g2">0</b></div>
                <div class="stat-group" style="color:var(--tennis-yellow)">W:<span id="sw2">0</span> L:<span id="sl2">0</span></div>
                <div class="stat-group"><span style="color:var(--col-choke)">CH:<span id="ch2">0</span></span> <span style="color:var(--col-streak)">M:<span id="m2">0</span></span></div>
            </div>
            <table class="matrix-table" id="matrix2">
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
                <tr><td></td><td></td><td></td><td></td><td class="diff-cell"></td></tr>
            </table>
        </div>
    </div>
    <table class="trend-table">
        <tr><td id="p1-b1">-</td><td class="row-label">1°B</td><td id="p2-b1">-</td></tr>
        <tr><td id="p1-b2">-</td><td class="row-label">2°B</td><td id="p2-b2">-</td></tr>
        <tr><td id="p1-b3">-</td><td class="row-label">3°B</td><td id="p2-b3">-</td></tr>
        <tr><td id="p1-b4">-</td><td class="row-label">4°B</td><td id="p2-b4">-</td></tr>
    </table>
</div>

<div class="main-scroll">
    <div class="stream-container" style="background:#e3f2fd"><div id="stream1" class="stream"></div></div>
    <div class="stream-container" style="background:#fff9c4"><div id="stream2" class="stream"></div></div>
    <div class="counters-grid">
        <div class="player-card"><div id="p1-counts" class="count-row"></div></div>
        <div class="player-card"><div id="p2-counts" class="count-row"></div></div>
    </div>
</div>

<div class="footer-fixed">
    <div class="analysis-selector">
        <button class="sel-btn active" onclick="setView('G')">GAME</button>
        <button class="sel-btn" onclick="setView('I')">IGUAL</button>
        <button class="sel-btn" onclick="setView(1)">1°B</button>
        <button class="sel-btn" onclick="setView(2)">2°B</button>
        <button class="sel-btn" onclick="setView(3)">3°B</button>
        <button class="sel-btn" onclick="setView(4)">4°B</button>
    </div>
    <div class="action-btns">
        <button class="btn-act" style="background:#e74c3c" onclick="undo()">⬅ UNDO</button>
        <button class="btn-act" style="background:#7f8c8d" onclick="if(confirm('Reset?')) location.reload()">RESET</button>
    </div>
</div>

<script>
    const COL = { E: '#1b5e20', V: '#2e7d32', B: '#66bb6a', D: '#78909c', M: '#ef6c00', X: '#c62828' };
    let p1=0, p2=0, g1=0, g2=0, s1=0, s2=0, server=1, isTB=false;
    let srvPoints = { 
        1: {w:0, l:0, ch:0, curStreak:0, maxStreak:0, matrix: [], diffHistory: []}, 
        2: {w:0, l:0, ch:0, curStreak:0, maxStreak:0, matrix: [], diffHistory: []} 
    };
    let advRch = false, currentView = 'G', history = [], stats = { 1: [], 2: [] }, tempBallLog = { 1: {}, 2: {} }, deuces = { 15: false, 30: false, 40: false };

    function saveHistory() {
        history.push(JSON.stringify({p1, p2, g1, g2, s1, s2, server, isTB, stats, tempBallLog, deuces, srvPoints, advRch}));
    }

    function addPoint(w) {
        saveHistory();
        if (w === server) {
            srvPoints[server].w++;
            srvPoints[server].curStreak++;
            if (srvPoints[server].curStreak > srvPoints[server].maxStreak) srvPoints[server].maxStreak = srvPoints[server].curStreak;
        } else {
            srvPoints[server].l++;
            srvPoints[server].curStreak = 0;
        }

        if (isTB) {
            w === 1 ? p1++ : p2++;
            if ((p1 + p2) % 2 !== 0) server = (server === 1) ? 2 : 1;
            if ((p1 >= 7 || p2 >= 7) && Math.abs(p1 - p2) >= 2) finishGame(w);
        } else {
            if (server === 1 && p1 === 3 && p2 <= 1) advRch = true;
            if (server === 2 && p2 === 3 && p1 <= 1) advRch = true;
            
            let nP1=(w===1)?p1+1:p1, nP2=(w===2)?p2+1:p2;
            if (nP1===1 && nP2===1) deuces[15]=true;
            if (nP1===2 && nP2===2) deuces[30]=true;
            if (nP1===3 && nP2===3) deuces[40]=true;

            let bNum = (p1 + p2) + 1;
            if (bNum <= 4) {
                tempBallLog[server][bNum] = calcBallData(bNum, (w===1?p1+1:p1), (w===2?p2+1:p2));
                tempBallLog[server][bNum].won = (w === server);
            }
            w===1 ? (p1===3&&p2===4 ? p2=3 : p1++) : (p2===3&&p1===4 ? p1=3 : p2++);
            if ((p1>=4 || p2>=4) && Math.abs(p1-p2)>=2) finishGame(w);
        }
        updateUI();
    }

    function finishGame(w) {
        let srv = server;
        let sP = (srv === 1) ? p1 : p2;
        let rP = (srv === 1) ? p2 : p1;
        let isChoke = (advRch && w !== srv);
        if (isChoke) srvPoints[srv].ch++;

        let gRes;
        if (isTB) { gRes = {txt:'TB', c:COL.V, h:'h-3'}; }
        else if (w === srv) {
            if (rP === 0) gRes = {txt:'E', c:COL.E, h:'h-5'};
            else if (rP === 1) gRes = {txt:'V', c:COL.V, h:'h-4'};
            else gRes = {txt:'B', c:COL.B, h:'h-3'};
        } else {
            if (isChoke) gRes = {txt:'CH', c:COL.M, h:'h-2'};
            else if (sP === 0) gRes = {txt:'X', c:COL.X, h:'h-1'};
            else gRes = {txt:'M', c:COL.M, h:'h-2'};
        }

        // GUARDAR MATRIZ CON NUEVOS SÍMBOLOS Y DIFERENCIA W-L
        if(!isTB) {
            let row = [];
            for(let i=1; i<=4; i++) row.push(tempBallLog[srv][i] ? (tempBallLog[srv][i].won ? '✓' : '✗') : '-');
            srvPoints[srv].matrix.push(row);
            
            // CALCULAR Y GUARDAR DIFERENCIA W-L DESPUÉS DE ESTE GAME
            let diff = srvPoints[srv].w - srvPoints[srv].l;
            srvPoints[srv].diffHistory.push(diff);
            
            if(srvPoints[srv].matrix.length > 4) {
                srvPoints[srv].matrix.shift();
                srvPoints[srv].diffHistory.shift();
            }
        }

        stats[srv].push({type:'G', data:gRes});
        stats[srv].push({type:'I', data:{tower:{...deuces}, none:!(deuces[15]||deuces[30]||deuces[40])}});
        for(let i=1;i<=4;i++) if(tempBallLog[srv][i]) stats[srv].push({type:i, data:tempBallLog[srv][i]});
        
        tempBallLog={1:{}, 2:{}}; deuces={15:false, 30:false, 40:false}; advRch=false;
        p1=0; p2=0; w===1?g1++:g2++;
        
        if (g1===6 && g2===6 && !isTB) isTB=true;
        else if ((g1>=6 && Math.abs(g1-g2)>=2) || (g2>=6 && Math.abs(g1-g2)>=2) || isTB) {
            if(isTB || (g1>=6 || g2>=6)) { 
                s1+=(g1>g2?1:0); s2+=(g2>g1?1:0); g1=0; g2=0; isTB=false; 
                srvPoints[1].maxStreak = 0; srvPoints[2].maxStreak = 0;
            }
        }
        server=(server===1)?2:1;
        renderStreams();
    }

    function calcBallData(bNum, sp1, sp2) {
        const labels = ["0", "15", "30", "40", "G"];
        let myS = (server === 1) ? sp1 : sp2; let opS = (server === 1) ? sp2 : sp1;
        let color = COL.D;
        if (myS > opS) color = (opS === 0) ? COL.E : COL.V;
        else if (myS < opS) color = (myS === 0) ? COL.X : COL.M;
        return { txt: labels[myS]||"G", c: color, h: (color===COL.E?'h-5':(color===COL.V?'h-4':(color===COL.X?'h-1':(color===COL.M?'h-2':'h-3')))) };
    }

    function renderStreams() {
        [1,2].forEach(p => {
            // RENDER MATRIZ 5x4 (4 saques + diferencia W-L)
            const cells = document.getElementById(`matrix${p}`).getElementsByTagName('td');
            
            // Limpiar todas las celdas primero
            for(let i=0; i<cells.length; i++) {
                cells[i].innerText = '';
                cells[i].className = '';
            }
            
            // Procesar cada fila (4 filas)
            for(let row = 0; row < 4; row++) {
                // Procesar las primeras 4 columnas (los saques)
                for(let col = 0; col < 4; col++) {
                    let cellIndex = row * 5 + col;
                    let val = srvPoints[p].matrix[row] ? srvPoints[p].matrix[row][col] : '';
                    cells[cellIndex].innerText = val;
                    
                    // Aplicar clases según el símbolo
                    if(val === '✓') {
                        cells[cellIndex].className = 'm-win';
                    } else if(val === '✗') {
                        cells[cellIndex].className = 'm-loss';
                    } else {
                        cells[cellIndex].className = '';
                    }
                }
                
                // Mostrar diferencia W-L en la quinta columna
                let diffCellIndex = row * 5 + 4;
                let diff = srvPoints[p].diffHistory[row] !== undefined ? srvPoints[p].diffHistory[row] : null;
                
                if(diff !== null) {
                    let diffText = diff > 0 ? `+${diff}` : diff.toString();
                    cells[diffCellIndex].innerText = diffText;
                    
                    // Aplicar color según si es positivo o negativo
                    if(diff > 0) {
                        cells[diffCellIndex].className = 'diff-cell diff-positive';
                    } else if(diff < 0) {
                        cells[diffCellIndex].className = 'diff-cell diff-negative';
                    } else {
                        cells[diffCellIndex].className = 'diff-cell';
                    }
                } else {
                    cells[diffCellIndex].className = 'diff-cell';
                }
            }

            const el=document.getElementById('stream'+p); el.innerHTML='';
            const filtered=stats[p].filter(s=>s.type===currentView);
            const counts = {};
            filtered.forEach(e => {
                if(currentView==='I'){
                    let h='<div style="display:flex;flex-direction:column-reverse;gap:1px;min-width:22px">';
                    if(e.data.none) { h+=`<div class="dot" style="background:${COL.D}">-</div>`; counts['-']=(counts['-']||0)+1; }
                    else { ['15','30','40'].forEach(v => { if(e.data.tower[v]) { h+=`<div class="dot" style="background:${COL.D}">${v}</div>`; counts[v]=(counts[v]||0)+1; }}); }
                    el.innerHTML += h+'</div>';
                } else { 
                    el.innerHTML+=`<div class="dot ${e.data.h}" style="background:${e.data.c}">${e.data.txt}</div>`; 
                    counts[e.data.txt]=(counts[e.data.txt]||0)+1;
                }
            });
            el.scrollLeft = el.scrollWidth;

            const cEl = document.getElementById(`p${p}-counts`); cEl.innerHTML = '';
            
            // DEFINIR LAS CLAVES Y COLORES SEGÚN LA VISTA ACTUAL
            let keys = [];
            let colorMap = {};
            
            if (currentView === 'G') {
                keys = ['E','V','B','M','CH','X'];
                colorMap = {
                    'E': COL.E, 'V': COL.V, 'B': COL.B, 
                    'M': COL.M, 'CH': '#ff1744', 'X': COL.X
                };
            } else if (currentView === 'I') {
                keys = ['40','30','15','-'];
                colorMap = {
                    '40': COL.D, '30': COL.D, '15': COL.D, '-': COL.D
                };
            } else if (currentView === 1) {
                keys = ['15','0'];
                colorMap = {
                    '15': COL.E, // Verde oscuro
                    '0': COL.X   // Rojo
                };
            } else if (currentView === 2) {
                keys = ['30','15','0'];
                colorMap = {
                    '30': COL.E, // Verde oscuro
                    '15': COL.D, // Gris
                    '0': COL.X   // Rojo
                };
            } else if (currentView === 3) {
                keys = ['40','30','15','0'];
                colorMap = {
                    '40': COL.E, // Verde oscuro
                    '30': COL.V, // Verde claro
                    '15': COL.M, // Naranja
                    '0': COL.X   // Rojo
                };
            } else if (currentView === 4) {
                keys = ['G','40','30','15','0'];
                colorMap = {
                    'G': COL.E,  // Verde oscuro
                    '40': COL.V, // Verde claro
                    '30': COL.D, // Gris
                    '15': COL.M, // Naranja
                    '0': COL.X   // Rojo
                };
            }
            
            keys.forEach(k => {
                cEl.innerHTML += `<div class="c-item"><span class="c-val">${counts[k]||0}</span><span class="c-tag" style="background:${colorMap[k]}">${k}</span></div>`;
            });
        });
        updateTrends(); updateUI();
    }

    function updateTrends() {
        [1, 2].forEach(p => {
            for (let b = 1; b <= 4; b++) {
                const bStats = stats[p].filter(s => s.type === b);
                const cnt = {}; 
                bStats.forEach(s => {
                    const txt = s.data.txt;
                    // Filtrar solo los valores posibles según la bola
                    if (b === 1) {
                        // 1°B: solo puede ser 15 (15-0) o 0 (0-15)
                        if (txt === '15' || txt === '0') {
                            cnt[txt] = (cnt[txt] || 0) + 1;
                        }
                    } else if (b === 2) {
                        // 2°B: solo puede ser 30 (30-0), 15 (15-15), 0 (0-30)
                        if (txt === '30' || txt === '15' || txt === '0') {
                            cnt[txt] = (cnt[txt] || 0) + 1;
                        }
                    } else if (b === 3) {
                        // 3°B: puede ser 40 (40-0), 30 (30-15), 15 (15-30), 0 (0-40)
                        if (txt === '40' || txt === '30' || txt === '15' || txt === '0') {
                            cnt[txt] = (cnt[txt] || 0) + 1;
                        }
                    } else if (b === 4) {
                        // 4°B: puede ser G (GAME), 40 (40-15), 30 (30-30), 15 (15-40), 0 (0-40)
                        if (txt === 'G' || txt === '40' || txt === '30' || txt === '15' || txt === '0') {
                            cnt[txt] = (cnt[txt] || 0) + 1;
                        }
                    }
                });

                let maxV = 0, dom = "-", domC = "#ccc", displayText = "-";
                
                // Encontrar el valor más frecuente (dom)
                for (let k in cnt) { 
                    if (cnt[k] > maxV) { 
                        maxV = cnt[k]; 
                        dom = k; 
                    } 
                }
                
                // Asignar texto y color según la bola y el valor dominante
                if (maxV > 0) {
                    if (b === 1) {
                        if (dom === '15') {
                            displayText = "15-0";
                            domC = COL.E; // Verde oscuro
                        } else if (dom === '0') {
                            displayText = "0-15";
                            domC = COL.X; // Rojo
                        }
                    } else if (b === 2) {
                        if (dom === '30') {
                            displayText = "30-0";
                            domC = COL.E; // Verde oscuro
                        } else if (dom === '15') {
                            displayText = "15-15";
                            domC = COL.D; // Gris
                        } else if (dom === '0') {
                            displayText = "0-30";
                            domC = COL.X; // Rojo
                        }
                    } else if (b === 3) {
                        if (dom === '40') {
                            displayText = "40-0";
                            domC = COL.E; // Verde oscuro
                        } else if (dom === '30') {
                            displayText = "30-15";
                            domC = COL.V; // Verde claro
                        } else if (dom === '15') {
                            displayText = "15-30";
                            domC = COL.M; // Naranja
                        } else if (dom === '0') {
                            displayText = "0-40";
                            domC = COL.X; // Rojo
                        }
                    } else if (b === 4) {
                        if (dom === 'G') {
                            displayText = "GAME";
                            domC = COL.E; // Verde oscuro
                        } else if (dom === '40') {
                            displayText = "40-15";
                            domC = COL.V; // Verde claro
                        } else if (dom === '30') {
                            displayText = "30-30";
                            domC = COL.D; // Gris
                        } else if (dom === '15') {
                            displayText = "15-40";
                            domC = COL.M; // Naranja
                        } else if (dom === '0') {
                            displayText = "0-40";
                            domC = COL.X; // Rojo
                        }
                    }
                    
                    displayText = `${displayText} (${maxV})`;
                }
                
                const cell = document.getElementById(`p${p}-b${b}`);
                cell.innerText = displayText;
                cell.style.color = domC;
            }
        });
    }

    function setView(v) { 
        currentView = v; 
        document.querySelectorAll('.sel-btn').forEach(b => {
            let btnText = b.innerText;
            let viewText = '';
            if (v === 'G') viewText = 'GAME';
            else if (v === 'I') viewText = 'IGUAL';
            else viewText = v + '°B';
            
            b.classList.toggle('active', btnText.includes(viewText));
        }); 
        renderStreams(); 
    }
    
    function undo() {
        if (history.length === 0) return;
        const s = JSON.parse(history.pop());
        p1=s.p1; p2=s.p2; g1=s.g1; g2=s.g2; s1=s.s1; s2=s.s2; server=s.server; isTB=s.isTB;
        stats=s.stats; tempBallLog=s.tempBallLog; deuces=s.deuces; srvPoints=s.srvPoints; advRch=s.advRch;
        renderStreams();
    }

    // FUNCIÓN PARA PANTALLA COMPLETA
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }
    }

    // ESCUCHAR CAMBIOS EN EL MODO PANTALLA COMPLETA
    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
    document.addEventListener('msfullscreenchange', updateFullscreenButton);
    
    function updateFullscreenButton() {
        const fullBtn = document.getElementById('fullscreen-btn');
        if (document.fullscreenElement || 
            document.webkitFullscreenElement || 
            document.msFullscreenElement) {
            fullBtn.textContent = '⛶'; // Icono para salir de pantalla completa
            fullBtn.title = 'Salir de pantalla completa';
        } else {
            fullBtn.textContent = '⛶'; // Mismo icono, pero se ve diferente por los estilos
            fullBtn.title = 'Pantalla completa';
        }
    }

    function updateUI(){
        const lb=["0","15","30","40","AD"]; 
        document.getElementById('pts1').innerText=isTB ? p1 : (lb[p1]||"0"); document.getElementById('pts2').innerText=isTB ? p2 : (lb[p2]||"0");
        document.getElementById('g1').innerText=g1; document.getElementById('g2').innerText=g2; document.getElementById('s1').innerText=s1; document.getElementById('s2').innerText=s2;
        document.getElementById('sw1').innerText=srvPoints[1].w; document.getElementById('sl1').innerText=srvPoints[1].l; document.getElementById('ch1').innerText=srvPoints[1].ch;
        document.getElementById('sw2').innerText=srvPoints[2].w; document.getElementById('sl2').innerText=srvPoints[2].l; document.getElementById('ch2').innerText=srvPoints[2].ch;
        document.getElementById('m1').innerText=srvPoints[1].maxStreak; document.getElementById('m2').innerText=srvPoints[2].maxStreak;
        document.getElementById('zone1').className="p-box "+(server===1?"serving-now":""); document.getElementById('zone2').className="p-box "+(server===2?"serving-now":"");
    }
    renderStreams();
</script>
</body>
</html>
