<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tennis Stats Pro - Fixed Tiebreak</title>
    <style>
        :root {
            --tennis-yellow: #dff115;
            --court-blue: #2c3e50;
            --max-green: #27ae60;
            --mid-green: #82e0aa;
            --min-red: #ec7063;
            --grp-1: rgba(236, 240, 241, 0.5); 
            --grp-2: rgba(212, 230, 241, 0.5); 
            --grp-3: rgba(213, 245, 227, 0.5); 
            --grp-4: rgba(252, 243, 207, 0.5); 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .main-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        
        .scoreboard { display: grid; grid-template-columns: 1fr 1fr; background: var(--court-blue); color: white; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 3px solid #1a252f; }
        .player-zone { padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.3s ease; user-select: none; border-bottom: 8px solid transparent; }
        .serving-now { border-bottom-color: var(--tennis-yellow) !important; background: rgba(255,255,255,0.05); }
        .serving-now .player-name { color: var(--tennis-yellow) !important; transform: scale(1.05); }
        
        .player-name { font-size: 1.1rem; font-weight: bold; border: none; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); text-align: center; width: 90%; outline: none; border-radius: 4px; padding: 6px 0; }
        .pts-big { font-size: 5rem; font-weight: 800; color: var(--tennis-yellow); line-height: 1; margin: 10px 0; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        .btn-undo { background: #e74c3c; color: white; }
        .btn-reset { background: #7f8c8d; color: white; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 6px; text-align: center; font-weight: bold; }
        
        .g1 { background-color: var(--grp-1); }
        .g2 { background-color: var(--grp-2); }
        .g3 { background-color: var(--grp-3); }
        .g4 { background-color: var(--grp-4); }

        .rank-1 { color: var(--max-green); font-size: 1.1rem; }
        .streak-dot { font-size: 1.2rem; }
        .flash-effect { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { background-color: rgba(255, 255, 255, 0.4); } 100% { background-color: transparent; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="scoreboard">
        <div id="zone1" class="player-zone serving-now" onclick="addPoint(1, event)">
            <input type="text" class="player-name" id="name1" value="Jugador 1" oninput="renderTable()" onclick="event.stopPropagation()">
            <div class="pts-big" id="pts1">0</div>
            <div style="font-weight: bold;">SETS: <span id="s1">0</span> | GMS: <span id="g1">0</span></div>
        </div>
        <div id="zone2" class="player-zone" onclick="addPoint(2, event)">
            <input type="text" class="player-name" id="name2" value="Jugador 2" oninput="renderTable()" onclick="event.stopPropagation()">
            <div class="pts-big" id="pts2">0</div>
            <div style="font-weight: bold;">SETS: <span id="s2">0</span> | GMS: <span id="g2">0</span></div>
        </div>
    </div>

    <div class="action-row">
        <button class="btn-undo" onclick="undo()">⬅ DESHACER</button>
        <button class="btn-reset" onclick="if(confirm('¿Reiniciar?')) location.reload()">RESET</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Marcador</th>
                <th colspan="2" id="th-n1">Saque J1</th>
                <th colspan="2" id="th-n2">Saque J2</th>
            </tr>
            <tr style="background: #ecf0f1; font-size: 0.7rem;">
                <th>GRUPO</th>
                <th>CANT.</th><th>FLUJO</th>
                <th>CANT.</th><th>FLUJO</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    let p1 = 0, p2 = 0, g1 = 0, g2 = 0, s1 = 0, s2 = 0;
    let server = 1, isTiebreak = false, history = [];
    let deuceCounted = false;
    let gameCount = { 1: 0, 2: 0 }; 
    let lastSeenInGame = { 1: {}, 2: {} };

    const groups = {
        "15-0": "g1", "0-15": "g1",
        "30-0": "g2", "15-15": "g2", "0-30": "g2",
        "40-0": "g3", "30-15": "g3", "15-30": "g3", "0-40": "g3",
        "Gano-0": "g4", "40-15": "g4", "30-30": "g4", "15-40": "g4", "Perdio-0": "g4",
        "40-30": "", "30-40": "", "40-40": ""
    };

    let stats = { 1: {}, 2: {} };
    Object.keys(groups).forEach(k => { 
        stats[1][k] = 0; stats[2][k] = 0; 
        lastSeenInGame[1][k] = -1; lastSeenInGame[2][k] = -1;
    });

    function capitalize(s) { return s.toLowerCase().replace(/\b\w/g, l => l.toUpperCase()); }

    function addPoint(winner, event) {
        if (event && event.target.tagName === 'INPUT') return;
        const zone = document.getElementById('zone' + winner);
        zone.classList.add('flash-effect'); setTimeout(() => zone.classList.remove('flash-effect'), 300);

        let currentServ = server;
        const labels = ["0", "15", "30", "40", "AD"];
        
        // Guardar estado previo para Undo
        history.push({
            state: JSON.parse(JSON.stringify({p1, p2, g1, g2, s1, s2, server, isTiebreak, deuceCounted, gameCount, lastSeenInGame: JSON.parse(JSON.stringify(lastSeenInGame))})),
            statKey: null, statServer: currentServ
        });

        if (isTiebreak) {
            if (winner === 1) p1++; else p2++;
            // Lógica de fin de Tie-break
            if ((p1 >= 7 || p2 >= 7) && Math.abs(p1 - p2) >= 2) {
                finishGame(winner);
            }
        } else {
            let nextP1 = p1, nextP2 = p2;
            if (winner === 1) { if (p1 === 3 && p2 === 4) nextP2 = 3; else nextP1++; } 
            else { if (p2 === 3 && p1 === 4) nextP1 = 3; else nextP2++; }

            let sLabel = (server === 1) ? `${labels[nextP1]}-${labels[nextP2]}` : `${labels[nextP2]}-${labels[nextP1]}`;
            let isGameEnd = (winner === 1 && (nextP1 >= 4 && nextP1 > nextP2 + 1)) || (winner === 2 && (nextP2 >= 4 && nextP2 > nextP1 + 1));

            let finalStatKey = null;
            if (isGameEnd) {
                let recPts = (server === 1) ? p2 : p1;
                if (winner === server && recPts === 0) finalStatKey = "Gano-0";
                else if (winner !== server && recPts === 0) finalStatKey = "Perdio-0";
                else if (groups.hasOwnProperty(sLabel)) finalStatKey = sLabel;
                
                history[history.length-1].statKey = finalStatKey;
                if (finalStatKey) { stats[currentServ][finalStatKey]++; lastSeenInGame[currentServ][finalStatKey] = gameCount[currentServ]; }
                finishGame(winner);
            } else {
                if (sLabel === "40-40") {
                    if (!deuceCounted) { finalStatKey = "40-40"; deuceCounted = true; }
                } else if (groups.hasOwnProperty(sLabel)) {
                    finalStatKey = sLabel;
                }
                
                history[history.length-1].statKey = finalStatKey;
                if (finalStatKey) { stats[currentServ][finalStatKey]++; lastSeenInGame[currentServ][finalStatKey] = gameCount[currentServ]; }
                p1 = nextP1; p2 = nextP2;
            }
        }
        updateUI(); renderTable();
    }

    function finishGame(winner) {
        if (winner === 1) g1++; else g2++;
        p1 = 0; p2 = 0;
        
        // Rotación de saque tras juego o TB
        server = (server === 1) ? 2 : 1;
        gameCount[1]++; gameCount[2]++; // Incrementar contador de juegos para flujo
        deuceCounted = false;

        // Comprobar fin de Set
        if (isTiebreak) {
            winSet(winner);
        } else if (g1 >= 6 && (g1 - g2) >= 2) {
            winSet(1);
        } else if (g2 >= 6 && (g2 - g1) >= 2) {
            winSet(2);
        } else if (g1 === 6 && g2 === 6) {
            isTiebreak = true;
            alert("¡Inicia Tie-break!");
        }
    }

    function winSet(winner) {
        if (winner === 1) s1++; else s2++;
        g1 = 0; g2 = 0; p1 = 0; p2 = 0;
        isTiebreak = false;
        alert("¡Set para " + capitalize(document.getElementById('name' + winner).value) + "!");
    }

    function undo() {
        if (history.length === 0) return;
        let last = history.pop();
        if (last.statKey) stats[last.statServer][last.statKey]--;
        let s = last.state;
        p1=s.p1; p2=s.p2; g1=s.g1; g2=s.g2; s1=s.s1; s2=s.s2; server=s.server; isTiebreak=s.isTiebreak; 
        deuceCounted=s.deuceCounted; gameCount=s.gameCount; lastSeenInGame=s.lastSeenInGame;
        updateUI(); renderTable();
    }

    function getStreakIcon(srv, key) {
        let lastGame = lastSeenInGame[srv][key];
        if (lastGame === -1) return "➖";
        let diff = (gameCount[srv] - 1) - lastGame;
        if (diff <= 1) return "🟢";
        if (diff <= 3) return "⚪";
        return "🔴";
    }

    function renderTable() {
        const body = document.getElementById('table-body');
        body.innerHTML = "";
        const n1 = capitalize(document.getElementById('name1').value);
        const n2 = capitalize(document.getElementById('name2').value);
        document.getElementById('th-n1').innerText = "Saque " + n1;
        document.getElementById('th-n2').innerText = "Saque " + n2;

        Object.keys(groups).forEach(key => {
            const v1 = stats[1][key], v2 = stats[2][key];
            const grpClass = groups[key];
            body.innerHTML += `<tr class="${grpClass}">
                <td class="score-label">${key}</td>
                <td class="${v1 > 0 ? 'rank-1' : ''}">${v1}</td>
                <td class="streak-dot">${getStreakIcon(1, key)}</td>
                <td class="${v2 > 0 ? 'rank-1' : ''}">${v2}</td>
                <td class="streak-dot">${getStreakIcon(2, key)}</td>
            </tr>`;
        });
    }

    function updateUI() {
        const labels = ["0", "15", "30", "40", "AD"];
        document.getElementById('pts1').innerText = isTiebreak ? p1 : (labels[p1] || "0");
        document.getElementById('pts2').innerText = isTiebreak ? p2 : (labels[p2] || "0");
        document.getElementById('g1').innerText = g1; document.getElementById('g2').innerText = g2;
        document.getElementById('s1').innerText = s1; document.getElementById('s2').innerText = s2;
        document.getElementById('zone1').classList.toggle('serving-now', server === 1);
        document.getElementById('zone2').classList.toggle('serving-now', server === 2);
    }

    updateUI(); renderTable();
</script>
</body>
</html>
